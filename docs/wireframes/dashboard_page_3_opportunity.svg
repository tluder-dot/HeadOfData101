  <text x="880" y="632" fill="#64748B" font-size="10" font-weight="600" letter-spacing="0.5">LABEL</text>
  <text x="1020" y="632" fill="#64748B" font-size="10" font-weight="600" letter-spacing="0.5">FLAG</text>

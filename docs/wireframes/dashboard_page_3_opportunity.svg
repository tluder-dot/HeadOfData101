  <!-- Footer -->
  <text x="30" y="775" fill="#94A3B8" font-size="10">Model: Random Forest · target: top_price (from AutoScout label) · source: fact_top_price_predictions</text>
  <text x="1170" y="775" text-anchor="end" fill="#94A3B8" font-size="10">WIREFRAME · Session 1 mock · not production data</text>

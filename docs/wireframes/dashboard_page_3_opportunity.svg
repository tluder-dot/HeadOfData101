    <text x="50" y="198" fill="#1E293B" font-size="30" font-weight="700">0.83</text>
    <text x="130" y="198" fill="#10B981" font-size="12">▲ Random Forest</text>

    <rect x="317" y="135" width="275" height="90" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="337" y="162" fill="#64748B" font-size="11" font-weight="600" letter-spacing="0.5">PRECISION @ THRESHOLD</text>
    <text x="337" y="198" fill="#1E293B" font-size="30" font-weight="700">0.58</text>
    <text x="420" y="198" fill="#64748B" font-size="12">recall 0.67 · F1 0.62</text>

    <rect x="604" y="135" width="275" height="90" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="624" y="162" fill="#64748B" font-size="11" font-weight="600" letter-spacing="0.5">CANDIDATES AT ≥ 0.45</text>

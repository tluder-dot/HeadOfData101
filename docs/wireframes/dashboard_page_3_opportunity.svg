    <text x="60" y="658">1</text><text x="110" y="658">#0412</text><text x="220" y="658">Golf 8 · 2020</text><text x="400" y="658">€19,800</text><text x="510" y="658">€23,400</text><text x="630" y="658" fill="#10B981" font-weight="600">−€3,600</text><text x="740" y="658" font-weight="600">0.79</text><text x="880" y="658">good-price</text>
    <rect x="1015" y="647" width="85" height="16" rx="3" fill="#10B981"/><text x="1057" y="659" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="600">review now</text>

    <text x="60" y="678">2</text><text x="110" y="678">#1042</text><text x="220" y="678">Golf Variant · 2019</text><text x="400" y="678">€14,900</text><text x="510" y="678">€18,200</text><text x="630" y="678" fill="#10B981" font-weight="600">−€3,300</text><text x="740" y="678" font-weight="600">0.74</text><text x="880" y="678">good-price</text>
    <rect x="1015" y="667" width="85" height="16" rx="3" fill="#10B981"/><text x="1057" y="679" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="600">review now</text>

    <text x="60" y="698">3</text><text x="110" y="698">#0156</text><text x="220" y="698">Golf GTI · 2018</text><text x="400" y="698">€21,200</text><text x="510" y="698">€24,100</text><text x="630" y="698" fill="#10B981" font-weight="600">−€2,900</text><text x="740" y="698" font-weight="600">0.71</text><text x="880" y="698">good-price</text>
    <rect x="1015" y="687" width="85" height="16" rx="3" fill="#3B82F6"/><text x="1057" y="699" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="600">monitor</text>

    <text x="60" y="718">… 22 more</text>
    <text x="220" y="718" fill="#94A3B8" font-style="italic">(populated post-modeling in Session 7)</text>

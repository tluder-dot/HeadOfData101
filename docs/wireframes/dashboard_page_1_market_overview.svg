    <rect x="798" y="405" width="180" height="28" fill="#1E40AF"/>
    <rect x="978" y="405" width="100" height="28" fill="#3B82F6"/>
    <rect x="1078" y="405" width="48" height="28" fill="#60A5FA"/>
    <rect x="1126" y="405" width="20" height="28" fill="#93C5FD"/>

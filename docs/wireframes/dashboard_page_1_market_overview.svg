<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <!-- Background -->
  <rect width="1200" height="800" fill="#F8FAFC"/>

  <!-- Header bar -->

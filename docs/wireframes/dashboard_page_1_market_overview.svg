  <text x="160" y="97" text-anchor="middle" fill="#1D4ED8" font-size="11">Fuel: All</text>
  <rect x="225" y="82" width="130" height="22" rx="11" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1"/>
  <text x="290" y="97" text-anchor="middle" fill="#1D4ED8" font-size="11">Age: 2–15 years</text>

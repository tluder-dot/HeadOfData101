    <rect x="105" y="460" width="40" height="50" fill="#93C5FD"/>
    <rect x="150" y="420" width="40" height="90" fill="#60A5FA"/>
    <rect x="195" y="380" width="40" height="130" fill="#3B82F6"/>
    <rect x="240" y="340" width="40" height="170" fill="#2563EB"/>
    <rect x="285" y="360" width="40" height="150" fill="#3B82F6"/>
    <rect x="330" y="395" width="40" height="115" fill="#60A5FA"/>
    <rect x="375" y="430" width="40" height="80" fill="#93C5FD"/>
    <rect x="420" y="460" width="40" height="50" fill="#BFDBFE"/>
    <rect x="465" y="475" width="40" height="35" fill="#DBEAFE"/>
    <rect x="510" y="485" width="40" height="25" fill="#DBEAFE"/>
    <rect x="555" y="490" width="40" height="20" fill="#DBEAFE"/>
    <rect x="600" y="495" width="40" height="15" fill="#DBEAFE"/>
    <rect x="645" y="500" width="40" height="10" fill="#DBEAFE"/>
    <rect x="690" y="503" width="40" height="7" fill="#DBEAFE"/>
  </g>

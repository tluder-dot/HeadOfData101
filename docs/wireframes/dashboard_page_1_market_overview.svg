  <text x="440" y="97" text-anchor="middle" fill="#1D4ED8" font-size="11">Price: 2k–60k EUR</text>
  <rect x="525" y="82" width="130" height="22" rx="11" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1"/>
  <text x="590" y="97" text-anchor="middle" fill="#64748B" font-size="11">+ Add filter</text>


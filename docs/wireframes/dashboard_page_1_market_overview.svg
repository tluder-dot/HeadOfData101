    <text x="985" y="423" fill="#FFFFFF" font-size="11" font-weight="500">Variant 27%</text>
    <text x="1082" y="423" fill="#FFFFFF" font-size="10">GTI/R 13%</text>

    <text x="798" y="465" fill="#64748B" font-size="11" font-weight="500">BY AGE BAND</text>
    <rect x="798" y="475" width="95" height="28" fill="#10B981"/>
    <rect x="893" y="475" width="160" height="28" fill="#3B82F6"/>
    <rect x="1053" y="475" width="93" height="28" fill="#94A3B8"/>
    <text x="808" y="493" fill="#FFFFFF" font-size="11" font-weight="500">2–5 yrs</text>
    <text x="900" y="493" fill="#FFFFFF" font-size="11" font-weight="500">6–10 yrs</text>
    <text x="1060" y="493" fill="#FFFFFF" font-size="11" font-weight="500">11–15 yrs</text>
  </g>

  <!-- Commentary panel -->
  <rect x="30" y="558" width="1136" height="180" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="50" y="585" fill="#1E293B" font-size="14" font-weight="600">Market Context</text>

  <g transform="translate(50, 605)">
    <circle cx="5" cy="8" r="3" fill="#3B82F6"/>
    <text x="18" y="12" fill="#334155" font-size="12"><tspan font-weight="600">Liquid and price-stable.</tspan> The Golf is Germany's most liquid used compact, with consistent demand across all</text>
    <text x="18" y="30" fill="#334155" font-size="12">age bands — the default financing-portfolio candidate for a retail bank entering the used-vehicle space.</text>

    <circle cx="5" cy="58" r="3" fill="#3B82F6"/>
    <text x="18" y="62" fill="#334155" font-size="12"><tspan font-weight="600">Segment structure.</tspan> Petrol dominates post-2018 registrations; diesel is concentrated in older listings. GTI/R</text>
    <text x="18" y="80" fill="#334155" font-size="12">variants trade at a clear premium and likely form their own sub-segment in the top-price label.</text>

    <circle cx="5" cy="108" r="3" fill="#3B82F6"/>
    <text x="18" y="112" fill="#334155" font-size="12"><tspan font-weight="600">Data note.</tspan> Numbers above are illustrative placeholders — the real values will populate once Session 3</text>
    <text x="18" y="130" fill="#334155" font-size="12">preprocessing lands the cleaned CSV and the warehouse is built.</text>
  </g>

  <!-- Footer -->
  <text x="30" y="775" fill="#94A3B8" font-size="10">Source: AutoScout24 · scope: Volkswagen Golf · listing country: Germany · last refresh: &lt;pending Session 2&gt;</text>
  <text x="1170" y="775" text-anchor="end" fill="#94A3B8" font-size="10">WIREFRAME · Session 1 mock · not production data</text>
</svg>

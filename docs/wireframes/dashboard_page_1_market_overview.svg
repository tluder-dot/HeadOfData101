  <text x="65" y="528" fill="#64748B" font-size="10">2k</text>
  <text x="200" y="528" fill="#64748B" font-size="10">10k</text>
  <text x="380" y="528" fill="#64748B" font-size="10">20k</text>
  <text x="560" y="528" fill="#64748B" font-size="10">40k</text>
  <text x="700" y="528" fill="#64748B" font-size="10">60k EUR</text>


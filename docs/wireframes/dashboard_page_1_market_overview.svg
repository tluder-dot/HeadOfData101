    <rect x="15" y="55" width="14" height="14" fill="#3B82F6"/>
    <text x="38" y="67" fill="#1E293B" font-size="11">good-price — 42%</text>
    <rect x="15" y="75" width="14" height="14" fill="#94A3B8"/>
    <text x="38" y="87" fill="#1E293B" font-size="11">fair-price — 31%</text>
    <rect x="15" y="95" width="14" height="14" fill="#F59E0B"/>

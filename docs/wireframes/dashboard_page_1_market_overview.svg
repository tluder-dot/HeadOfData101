  <g>
    <text x="798" y="325" fill="#64748B" font-size="11" font-weight="500">BY FUEL TYPE</text>
    <rect x="798" y="335" width="235" height="28" fill="#3B82F6"/>
    <rect x="1033" y="335" width="80" height="28" fill="#10B981"/>
    <rect x="1113" y="335" width="25" height="28" fill="#F59E0B"/>
    <rect x="1138" y="335" width="8" height="28" fill="#EF4444"/>
    <text x="808" y="353" fill="#FFFFFF" font-size="11" font-weight="500">Petrol 61%</text>
    <text x="1040" y="353" fill="#FFFFFF" font-size="11" font-weight="500">Diesel 22%</text>
    <text x="1117" y="353" fill="#FFFFFF" font-size="10">Hyb</text>


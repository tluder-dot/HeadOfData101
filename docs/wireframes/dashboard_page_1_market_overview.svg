    <text x="50" y="198" fill="#1E293B" font-size="30" font-weight="700">1,240</text>
    <text x="180" y="198" fill="#10B981" font-size="12" font-weight="500">▲ captured 24 Apr</text>

    <rect x="317" y="135" width="275" height="90" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="337" y="162" fill="#64748B" font-size="11" font-weight="600" letter-spacing="0.5">AVG LISTING PRICE</text>
    <text x="337" y="198" fill="#1E293B" font-size="30" font-weight="700">€18,450</text>
    <text x="470" y="198" fill="#64748B" font-size="12">median €16,900</text>

    <rect x="604" y="135" width="275" height="90" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>

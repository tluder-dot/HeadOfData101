  <text x="1170" y="40" text-anchor="end" fill="#FFFFFF" font-size="13" font-weight="500">CONSUMER BANK · DATA UNIT</text>
  <text x="1170" y="58" text-anchor="end" fill="#94A3B8" font-size="11">Scope: VW Golf · Germany</text>

  <!-- Filter bar -->

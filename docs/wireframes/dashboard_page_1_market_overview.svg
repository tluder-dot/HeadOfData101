    <text x="750" y="198" fill="#64748B" font-size="12">median 92k km</text>

    <rect x="891" y="135" width="275" height="90" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="911" y="162" fill="#64748B" font-size="11" font-weight="600" letter-spacing="0.5">AVG AGE</text>

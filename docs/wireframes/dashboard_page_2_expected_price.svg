<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <!-- Background -->
  <rect width="1200" height="800" fill="#F8FAFC"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="1200" height="70" fill="#1E293B"/>
  <text x="30" y="35" fill="#FFFFFF" font-size="20" font-weight="600">Used Vehicle Opportunity Portfolio</text>
  <text x="30" y="58" fill="#94A3B8" font-size="13">Page 2 · Expected Price &amp; Gap Analysis</text>
  <text x="1170" y="40" text-anchor="end" fill="#FFFFFF" font-size="13" font-weight="500">CONSUMER BANK · DATA UNIT</text>
  <text x="1170" y="58" text-anchor="end" fill="#94A3B8" font-size="11">Scope: VW Golf · Germany</text>

  <!-- Filter bar -->
  <rect x="0" y="70" width="1200" height="45" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="30" y="97" fill="#64748B" font-size="11" font-weight="600" letter-spacing="0.5">FILTERS:</text>
  <rect x="105" y="82" width="130" height="22" rx="11" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1"/>
  <text x="170" y="97" text-anchor="middle" fill="#1D4ED8" font-size="11">Min gap: −10%</text>
  <rect x="245" y="82" width="150" height="22" rx="11" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1"/>
  <text x="320" y="97" text-anchor="middle" fill="#1D4ED8" font-size="11">Fuel: Petrol + Diesel</text>
  <rect x="405" y="82" width="130" height="22" rx="11" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1"/>
  <text x="470" y="97" text-anchor="middle" fill="#1D4ED8" font-size="11">Age: 4–10 years</text>

  <!-- KPI tiles row -->
  <g>
    <rect x="30" y="135" width="275" height="90" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="50" y="162" fill="#64748B" font-size="11" font-weight="600" letter-spacing="0.5">MODEL R²</text>
    <text x="50" y="198" fill="#1E293B" font-size="30" font-weight="700">0.78</text>
    <text x="130" y="198" fill="#64748B" font-size="12">multivariate OLS</text>

    <rect x="317" y="135" width="275" height="90" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="337" y="162" fill="#64748B" font-size="11" font-weight="600" letter-spacing="0.5">MAE (test)</text>
    <text x="337" y="198" fill="#1E293B" font-size="30" font-weight="700">€2,340</text>
    <text x="480" y="198" fill="#64748B" font-size="12">≈ 12% of mean</text>

    <rect x="604" y="135" width="275" height="90" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="624" y="162" fill="#64748B" font-size="11" font-weight="600" letter-spacing="0.5">LISTINGS BELOW EXPECTED</text>
    <text x="624" y="198" fill="#10B981" font-size="30" font-weight="700">187</text>
    <text x="710" y="198" fill="#64748B" font-size="12">potential discounts</text>

    <rect x="891" y="135" width="275" height="90" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="911" y="162" fill="#64748B" font-size="11" font-weight="600" letter-spacing="0.5">AVG DISCOUNT (where negative)</text>
    <text x="911" y="198" fill="#1E293B" font-size="30" font-weight="700">−€1,850</text>
    <text x="1080" y="198" fill="#64748B" font-size="12">−9.8%</text>
  </g>

  <!-- Main chart: Actual vs Expected scatter -->
  <rect x="30" y="248" width="735" height="290" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="50" y="275" fill="#1E293B" font-size="14" font-weight="600">Actual vs Expected Price</text>
  <text x="50" y="292" fill="#64748B" font-size="11">Points below the diagonal trade below model expectation — candidates for review</text>

  <!-- Scatter plot -->
  <g>
    <!-- Grid -->
    <line x1="80" y1="310" x2="80" y2="510" stroke="#E2E8F0" stroke-width="1"/>
    <line x1="80" y1="510" x2="740" y2="510" stroke="#E2E8F0" stroke-width="1"/>
    <!-- Diagonal reference line -->
    <line x1="80" y1="510" x2="740" y2="310" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="4,4"/>
    <text x="625" y="330" fill="#64748B" font-size="10" font-style="italic">y = x (expected = actual)</text>

    <!-- Scatter points - split: above diagonal (overpriced, amber) vs below (discount, green) -->
    <g fill="#94A3B8" opacity="0.6">
      <circle cx="140" cy="460" r="3"/><circle cx="160" cy="455" r="3"/><circle cx="175" cy="440" r="3"/>
      <circle cx="200" cy="440" r="3"/><circle cx="220" cy="425" r="3"/><circle cx="240" cy="420" r="3"/>
      <circle cx="260" cy="410" r="3"/><circle cx="290" cy="395" r="3"/><circle cx="310" cy="385" r="3"/>
      <circle cx="335" cy="370" r="3"/><circle cx="360" cy="360" r="3"/><circle cx="385" cy="350" r="3"/>
      <circle cx="410" cy="340" r="3"/><circle cx="440" cy="330" r="3"/><circle cx="470" cy="325" r="3"/>
      <circle cx="500" cy="315" r="3"/><circle cx="530" cy="310" r="3"/><circle cx="560" cy="305" r="3"/>
      <circle cx="590" cy="298" r="3"/><circle cx="620" cy="290" r="3"/><circle cx="650" cy="282" r="3"/>
    </g>
    <!-- Discount points (below diagonal = good) -->
    <g fill="#10B981">
      <circle cx="150" cy="495" r="4"/><circle cx="180" cy="485" r="4"/><circle cx="210" cy="475" r="4"/>
      <circle cx="245" cy="465" r="4"/><circle cx="275" cy="450" r="4"/><circle cx="310" cy="440" r="4"/>
      <circle cx="340" cy="425" r="4"/><circle cx="380" cy="410" r="4"/><circle cx="420" cy="395" r="4"/>
      <circle cx="460" cy="380" r="4"/><circle cx="495" cy="365" r="4"/><circle cx="535" cy="350" r="4"/>
      <circle cx="570" cy="340" r="4"/><circle cx="610" cy="325" r="4"/><circle cx="650" cy="315" r="4"/>
    </g>
    <!-- Overprice points (above diagonal = amber) -->
    <g fill="#F59E0B">
      <circle cx="135" cy="430" r="3"/><circle cx="170" cy="410" r="3"/><circle cx="215" cy="390" r="3"/>
      <circle cx="260" cy="370" r="3"/><circle cx="305" cy="355" r="3"/><circle cx="355" cy="335" r="3"/>
      <circle cx="410" cy="320" r="3"/><circle cx="470" cy="305" r="3"/><circle cx="540" cy="290" r="3"/>
      <circle cx="610" cy="272" r="3"/>
    </g>

    <!-- Axis labels -->
    <text x="410" y="535" text-anchor="middle" fill="#64748B" font-size="11">Expected Price (EUR)</text>
    <text x="65" y="410" fill="#64748B" font-size="11" transform="rotate(-90, 65, 410)" text-anchor="middle">Actual Price (EUR)</text>
    <text x="85" y="527" fill="#64748B" font-size="9">2k</text>
    <text x="400" y="527" fill="#64748B" font-size="9">25k</text>
    <text x="720" y="527" fill="#64748B" font-size="9">55k</text>

    <!-- Legend -->
    <rect x="600" y="440" width="130" height="55" rx="4" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <circle cx="615" cy="455" r="4" fill="#10B981"/>
    <text x="625" y="459" fill="#1E293B" font-size="10">below expected</text>
    <circle cx="615" cy="475" r="3" fill="#F59E0B"/>
    <text x="625" y="478" fill="#1E293B" font-size="10">above expected</text>
    <circle cx="615" cy="490" r="3" fill="#94A3B8" opacity="0.6"/>
    <text x="625" y="493" fill="#1E293B" font-size="10">on expected</text>
  </g>

  <!-- Secondary chart: Residual distribution -->
  <rect x="778" y="248" width="388" height="290" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="798" y="275" fill="#1E293B" font-size="14" font-weight="600">Residual Distribution</text>
  <text x="798" y="292" fill="#64748B" font-size="11">Actual − Expected · centered near zero = well-calibrated</text>

  <!-- Residual histogram -->
  <g>
    <!-- Zero line -->
    <line x1="972" y1="320" x2="972" y2="500" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="3,3"/>
    <text x="972" y="315" text-anchor="middle" fill="#EF4444" font-size="10">0</text>

    <!-- Bars (approx normal distribution) -->
    <rect x="808" y="485" width="20" height="15" fill="#DBEAFE"/>
    <rect x="830" y="470" width="20" height="30" fill="#BFDBFE"/>
    <rect x="852" y="445" width="20" height="55" fill="#93C5FD"/>
    <rect x="874" y="410" width="20" height="90" fill="#60A5FA"/>
    <rect x="896" y="370" width="20" height="130" fill="#3B82F6"/>
    <rect x="918" y="340" width="20" height="160" fill="#2563EB"/>
    <rect x="940" y="325" width="20" height="175" fill="#1D4ED8"/>
    <rect x="962" y="330" width="20" height="170" fill="#1E40AF"/>
    <rect x="984" y="360" width="20" height="140" fill="#1D4ED8"/>
    <rect x="1006" y="395" width="20" height="105" fill="#2563EB"/>
    <rect x="1028" y="430" width="20" height="70" fill="#3B82F6"/>
    <rect x="1050" y="455" width="20" height="45" fill="#60A5FA"/>
    <rect x="1072" y="470" width="20" height="30" fill="#93C5FD"/>
    <rect x="1094" y="482" width="20" height="18" fill="#BFDBFE"/>
    <rect x="1116" y="492" width="20" height="8" fill="#DBEAFE"/>

    <line x1="808" y1="500" x2="1140" y2="500" stroke="#94A3B8" stroke-width="1"/>
    <text x="808" y="520" fill="#64748B" font-size="10">−€5k</text>
    <text x="970" y="520" text-anchor="middle" fill="#64748B" font-size="10">€0</text>
    <text x="1120" y="520" text-anchor="end" fill="#64748B" font-size="10">+€5k</text>
  </g>

  <!-- Bottom section: Top 10 discounts table -->
  <rect x="30" y="558" width="1136" height="180" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="50" y="585" fill="#1E293B" font-size="14" font-weight="600">Top 10 Discounts (actual &lt; expected)</text>
  <text x="50" y="602" fill="#64748B" font-size="11">Ranked by absolute euro gap · candidates for deeper review in Page 3</text>

  <!-- Table header -->
  <line x1="50" y1="615" x2="1146" y2="615" stroke="#E2E8F0" stroke-width="1"/>
  <text x="60" y="632" fill="#64748B" font-size="10" font-weight="600" letter-spacing="0.5">LISTING</text>
  <text x="200" y="632" fill="#64748B" font-size="10" font-weight="600" letter-spacing="0.5">VARIANT</text>
  <text x="350" y="632" fill="#64748B" font-size="10" font-weight="600" letter-spacing="0.5">YEAR · FUEL · HP</text>
  <text x="560" y="632" fill="#64748B" font-size="10" font-weight="600" letter-spacing="0.5">MILEAGE</text>
  <text x="700" y="632" fill="#64748B" font-size="10" font-weight="600" letter-spacing="0.5">ACTUAL</text>
  <text x="820" y="632" fill="#64748B" font-size="10" font-weight="600" letter-spacing="0.5">EXPECTED</text>
  <text x="950" y="632" fill="#64748B" font-size="10" font-weight="600" letter-spacing="0.5">GAP</text>
  <text x="1060" y="632" fill="#64748B" font-size="10" font-weight="600" letter-spacing="0.5">LABEL</text>

  <line x1="50" y1="640" x2="1146" y2="640" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Table rows (placeholder) -->
  <g font-size="11" fill="#1E293B">
    <text x="60" y="658">#1042</text><text x="200" y="658">Golf Variant</text><text x="350" y="658">2019 · Petrol · 150</text><text x="560" y="658">68,400 km</text><text x="700" y="658">€14,900</text><text x="820" y="658">€18,200</text><text x="950" y="658" fill="#10B981" font-weight="600">−€3,300</text><text x="1060" y="658">good-price</text>
    <text x="60" y="678">#0887</text><text x="200" y="678">Golf 8</text><text x="350" y="678">2021 · Diesel · 115</text><text x="560" y="678">45,200 km</text><text x="700" y="678">€17,500</text><text x="820" y="678">€20,600</text><text x="950" y="678" fill="#10B981" font-weight="600">−€3,100</text><text x="1060" y="678">fair-price</text>
    <text x="60" y="698">#0156</text><text x="200" y="698">Golf GTI</text><text x="350" y="698">2018 · Petrol · 230</text><text x="560" y="698">88,000 km</text><text x="700" y="698">€21,200</text><text x="820" y="698">€24,100</text><text x="950" y="698" fill="#10B981" font-weight="600">−€2,900</text><text x="1060" y="698">good-price</text>
    <text x="60" y="718">… 7 more</text><text x="200" y="718" fill="#94A3B8" font-style="italic">(populated post-modeling in Session 6)</text>
  </g>

  <!-- Footer -->
  <text x="30" y="775" fill="#94A3B8" font-size="10">Model: Linear Regression · features: mileage, age, power · source: vw_regression_dataset (BigQuery view)</text>
  <text x="1170" y="775" text-anchor="end" fill="#94A3B8" font-size="10">WIREFRAME · Session 1 mock · not production data</text>
</svg>
